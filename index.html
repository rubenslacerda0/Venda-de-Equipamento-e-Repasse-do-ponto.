<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Venda de Equipamentos</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
  padding-bottom: 120px;
}

header {
  background: linear-gradient(90deg, #ff3c00, #ff7a00);
  color: white;
  text-align: center;
  padding: 20px;
}

.search-box input {
  width: 90%;
  padding: 10px;
  border-radius: 30px;
  border: none;
}

.container {
  padding: 20px;
}

.produtos {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  background: white;
  border-radius: 10px;
  overflow: hidden;
}

.carousel {
  position: relative;
}

.carousel img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.seta {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.5);
  color: white;
  border: none;
  padding: 5px 10px;
  cursor: pointer;
  border-radius: 5px;
}

.esq { left: 5px; }
.dir { right: 5px; }

.card-content {
  padding: 10px;
}

.footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  padding: 10px;
}

.btn {
  background: #25D366;
  color: white;
  padding: 10px;
  width: 100%;
  border: none;
  border-radius: 5px;
}
</style>
</head>

<body>

<header>
  <h1>🔥 Venda de Equipamentos 🔥</h1>

  <div class="search-box">
    <input type="text" id="pesquisa" onkeyup="filtrarProdutos()" placeholder="Buscar...">
  </div>

  <div>
    <input type="checkbox" onclick="selecionarTodos(this)"> Selecionar todos
  </div>
</header>

<div class="container">
  <div class="produtos" id="produtos"></div>
</div>

<div class="footer">
  Total: R$ <span id="total">0</span>
  <button class="btn" onclick="enviarWhats()">Enviar no WhatsApp</button>
</div>

<script>
const sheetID = "1k-6QC6mC8h7z7TL4lEnfXNKUNv8C4qWOdU48pqIw4c4";
const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

let produtos = [];

function formatarPreco(valor){
  return Number(valor).toLocaleString('pt-BR');
}

fetch(url)
.then(res => res.text())
.then(data => {
  const json = JSON.parse(data.substr(47).slice(0, -2));
  const rows = json.table.rows;

  produtos = rows.map(r => ({
    nome: r.c[0]?.v || "",
    descricao: r.c[1]?.v || "",
    precoNovo: r.c[2]?.v || 0,
    precoVenda: r.c[3]?.v || 0,
    imagens: [
      r.c[4]?.v,
      r.c[5]?.v,
      r.c[6]?.v,
      r.c[7]?.v,
      r.c[8]?.v
    ].filter(i => i)
  }));

  carregarProdutos(produtos);
});

function carregarProdutos(lista) {
  const container = document.getElementById("produtos");
  container.innerHTML = "";

  lista.forEach((p, index) => {
    container.innerHTML += `
      <div class="card">
        <div class="carousel">
          <img id="img${index}" src="${p.imagens[0]}">

          ${p.imagens.length > 1 ? `
            <button class="seta esq" onclick="trocar(${index}, -1)">‹</button>
            <button class="seta dir" onclick="trocar(${index}, 1)">›</button>
          ` : ""}
        </div>

        <div class="card-content">
          <h3>${p.nome}</h3>
          <p>${p.descricao}</p>

          <div style="font-size:12px;color:#777;">Média do item novo:</div>
          <div style="text-decoration:line-through;font-size:18px;color:#999;">
            R$ ${formatarPreco(p.precoNovo)}
          </div>
          <div style="color:#ff3c00;font-size:22px;font-weight:bold;">
            R$ ${formatarPreco(p.precoVenda)}
          </div>

          <input type="checkbox" value="${p.precoVenda}" onchange="calcular()" data-nome="${p.nome}">
        </div>
      </div>
    `;
  });
}

function trocar(i, direcao) {
  let p = produtos[i];
  p.index = p.index || 0;

  p.index += direcao;

  if (p.index < 0) p.index = p.imagens.length - 1;
  if (p.index >= p.imagens.length) p.index = 0;

  document.getElementById("img" + i).src = p.imagens[p.index];
}

function filtrarProdutos() {
  const termo = document.getElementById("pesquisa").value.toLowerCase();

  const filtrados = produtos.filter(p =>
    p.nome.toLowerCase().includes(termo) ||
    p.descricao.toLowerCase().includes(termo)
  );

  carregarProdutos(filtrados);
}

function selecionarTodos(master) {
  document.querySelectorAll("input[type=checkbox]").forEach(cb => cb.checked = master.checked);
  calcular();
}

function calcular() {
  let total = 0;
  document.querySelectorAll("input[type=checkbox]:checked").forEach(el => {
    total += parseFloat(el.value);
  });
  document.getElementById("total").innerText = formatarPreco(total);
}

function enviarWhats() {
  let msg = "Olá, tenho interesse:%0A";
  let total = 0;

  document.querySelectorAll("input[type=checkbox]:checked").forEach(el => {
    msg += "- " + el.dataset.nome + "%0A";
    total += parseFloat(el.value);
  });

  msg += "%0ATotal: R$ " + formatarPreco(total);

  window.open(`https://wa.me/556292510089?text=${msg}`);
}
</script>

</body>
</html>
